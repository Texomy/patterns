$import: numbers

Date:
  - '${Integer:year}-${Integer:month}-${Integer:day}'
  - '${Integer:month}/${Integer:day}/${Integer:year}'
  - '${Month:month} ${Integer:day}(?:st|nd|rd|th)?, ${Integer:year}'

Month:
  JAN: 'January'
  FEB: 'February'
  MAR: 'March'
  APR: 'April'
  MAY: 'May'
  JUN: 'June'
  JUL: 'July'
  AUG: 'August'
  SEP: 'September'
  OCT: 'October'
  NOV: 'November'
  DEC: 'December'

TimePeriod:
  AM: 'AM'
  PM: 'PM'

Time:
  - '${Integer:hours}:${Integer:minutes}\s?${TimePeriod:period}'
  - '${Integer:hours}:${Integer:minutes}'
