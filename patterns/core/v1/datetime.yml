$import: numbers

Date:
  - '(?<year>${Integer})-(?<month>${Integer})-(<?day>${Integer})'
  - '(?<month>${Integer})/(?<day>${Integer})/(?<year>${Integer})'
  - '(?<month>${Month}) (?<day>${Integer})(?:st|nd|rd|th)?, (?<year>${Integer})'

Month:
  JAN: 'January'
  FEB: 'February'
  MAR: 'March'
  APR: 'April'
  MAY: 'May'
  JUN: 'June'
  JUL: 'July'
  AUG: 'August'
  SEP: 'September'
  OCT: 'October'
  NOV: 'November'
  DEC: 'December'

TimePeriod:
  AM: 'AM'
  PM: 'PM'

Time:
  - '(?<hours>${Integer}):(?<minutes>${Integer})\s?(?<period>${TimePeriod})'
  - '(?<hours>${Integer}):(?<minutes>${Integer})'
